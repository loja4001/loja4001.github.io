<style>
  :root{
    --navy: #17232F;
    --navy-deep: #0F1922;
    --parchment: #F4EFE2;
    --parchment-dim: #E7DFC9;
    --gold: #A8823C;
    --gold-bright: #C9A050;
    --ink: #22262B;
    --line: rgba(168,130,60,0.35);
    --ok: #4C7A5B;
    --danger: #9B4A3F;
    --radius: 3px;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--navy-deep);
    color: var(--parchment);
    font-family: 'Source Sans 3', sans-serif;
    min-height: 100vh;
  }
  h1,h2,h3,.display{
    font-family:'Fraunces', serif;
    font-weight:600;
    letter-spacing: 0.01em;
  }
  .mono{ font-family:'JetBrains Mono', monospace; }

  /* ---------- SEAL (signature element) ---------- */
  .seal{
    width:56px; height:56px; border-radius:50%;
    border:1.5px solid var(--gold);
    display:flex; align-items:center; justify-content:center;
    font-family:'Fraunces', serif; font-weight:700; font-size:15px;
    color: var(--gold-bright);
    position:relative;
    flex-shrink:0;
    overflow:hidden;
    background: var(--navy-deep);
  }
  .seal img{ width:100%; height:100%; object-fit:cover; }
  .seal::before{
    content:'';
    position:absolute; inset:0;
    border:1px solid var(--line);
    border-radius:50%;
    pointer-events:none;
  }

  /* ---------- LOGIN ---------- */
  #view-login{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:24px;
    background:
      radial-gradient(circle at 50% -10%, rgba(168,130,60,0.10), transparent 60%),
      var(--navy-deep);
  }
  .login-card{
    width:100%; max-width:380px;
    background: var(--navy);
    border:1px solid var(--line);
    border-radius: var(--radius);
    padding:40px 36px;
    text-align:center;
  }
  .login-card .seal{ margin:0 auto 20px; }
  .login-card h1{ font-size:22px; margin:0 0 4px; color:var(--parchment); }
  .login-card .sub{ font-size:13px; color:var(--gold-bright); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:28px; }
  .field{ text-align:left; margin-bottom:16px; }
  .field label{ display:block; font-size:12px; color:var(--gold-bright); margin-bottom:6px; letter-spacing:0.04em; text-transform:uppercase; }
  input[type=email], input[type=password], input[type=text], input[type=tel], input[type=date], select, textarea{
    width:100%; padding:11px 12px;
    background: var(--navy-deep);
    border:1px solid var(--line);
    border-radius: var(--radius);
    color: var(--parchment);
    font-family:'Source Sans 3', sans-serif;
    font-size:14px;
  }
  input:focus, select:focus, textarea:focus{
    outline:2px solid var(--gold-bright); outline-offset:1px;
  }
  button{
    font-family:'Source Sans 3', sans-serif;
    font-weight:600;
    font-size:14px;
    border-radius: var(--radius);
    border:1px solid var(--gold);
    background: var(--gold);
    color: var(--navy-deep);
    padding:11px 18px;
    cursor:pointer;
    letter-spacing:0.02em;
  }
  button:hover{ background: var(--gold-bright); }
  button.ghost{ background:transparent; color:var(--gold-bright); }
  button.ghost:hover{ background: rgba(168,130,60,0.12); }
  button.danger{ background:transparent; border-color:var(--danger); color:var(--danger); }
  button.danger:hover{ background: rgba(155,74,63,0.15); }
  button:disabled{ opacity:0.5; cursor:default; }
  .full{ width:100%; }
  #login-error{ color:#E0897C; font-size:13px; margin-top:14px; min-height:16px; }

  /* ---------- APP SHELL ---------- */
  #view-app{ display:none; }
  .shell{ display:flex; min-height:100vh; }
  .sidebar{
    width:220px; flex-shrink:0;
    background: var(--navy);
    border-right:1px solid var(--line);
    padding:24px 16px;
    display:flex; flex-direction:column;
  }
  .sidebar-head{ display:flex; align-items:center; gap:12px; margin-bottom:32px; padding:0 6px; }
  .sidebar-head .seal{ width:40px; height:40px; font-size:11px; }
  .sidebar-head .lodge-name{ font-size:12.5px; line-height:1.3; color:var(--parchment); }
  .sidebar-head .lodge-name b{ color:var(--gold-bright); font-weight:600; display:block; font-size:13px; }
  nav button{
    display:block; width:100%; text-align:left;
    background:none; border:none; color: var(--parchment); opacity:0.7;
    padding:10px 12px; font-size:14px; font-weight:500;
    border-left:2px solid transparent;
    border-radius:0;
  }
  nav button:hover{ opacity:1; background: rgba(168,130,60,0.08); }
  nav button.active{ opacity:1; color:var(--gold-bright); border-left-color: var(--gold); background: rgba(168,130,60,0.08); }
  .sidebar-foot{ margin-top:auto; padding-top:16px; border-top:1px solid var(--line); font-size:12px; color:var(--parchment); opacity:0.6; }
  .sidebar-foot .who{ margin-bottom:10px; word-break:break-all; }

  .main{ flex:1; padding:36px 44px; max-width:1100px; }
  .page-head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
  .page-head h2{ font-size:26px; margin:0; color:var(--parchment); }
  .page-head .count{ font-size:13px; color:var(--gold-bright); }

  .card{
    background: var(--navy);
    border:1px solid var(--line);
    border-radius: var(--radius);
    padding:22px 24px;
    margin-bottom:20px;
  }
  .card h3{ font-size:15px; color:var(--gold-bright); margin:0 0 16px; text-transform:uppercase; letter-spacing:0.05em; font-family:'Source Sans 3',sans-serif; font-weight:600; }

  table{ width:100%; border-collapse:collapse; font-size:13.5px; }
  th{ text-align:left; padding:8px 10px; color:var(--gold-bright); font-weight:600; border-bottom:1px solid var(--line); font-size:12px; text-transform:uppercase; letter-spacing:0.03em; }
  td{ padding:10px 10px; border-bottom:1px solid rgba(168,130,60,0.15); color:var(--parchment); vertical-align:top; }
  tr:hover td{ background: rgba(168,130,60,0.05); }
  .empty-row td{ text-align:center; color:var(--parchment); opacity:0.5; padding:28px; font-style:italic; }

  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .grid3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
  @media (max-width:640px){ .grid2, .grid3{ grid-template-columns:1fr; } }

  .badge{ display:inline-block; padding:2px 9px; border-radius:20px; font-size:11.5px; font-weight:600; letter-spacing:0.02em; }
  .badge.grau{ background: rgba(168,130,60,0.18); color: var(--gold-bright); }
  .badge.ok{ background: rgba(76,122,91,0.2); color:#8FC79E; }
  .badge.warn{ background: rgba(155,74,63,0.2); color:#E0897C; }

  .toolbar{ display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
  .toolbar input{ flex:1; min-width:180px; }

  .toast{
    position:fixed; bottom:24px; right:24px;
    background: var(--gold); color:var(--navy-deep);
    padding:12px 20px; border-radius:var(--radius);
    font-size:14px; font-weight:600;
    box-shadow:0 6px 20px rgba(0,0,0,0.35);
    opacity:0; transform:translateY(8px);
    transition: all 0.25s ease;
    pointer-events:none;
    z-index:50;
  }
  .toast.show{ opacity:1; transform:translateY(0); }
  .toast.err{ background: var(--danger); color:#fff; }

  .modal-overlay{
    position:fixed; inset:0; background:rgba(15,25,34,0.72);
    display:none; align-items:center; justify-content:center; z-index:40; padding:20px;
  }
  .modal-overlay.show{ display:flex; }
  .modal{ background:var(--navy); border:1px solid var(--line); border-radius:var(--radius); padding:28px; width:100%; max-width:460px; max-height:88vh; overflow-y:auto; }
  .modal h3{ margin-top:0; }
  .modal-actions{ display:flex; justify-content:flex-end; gap:10px; margin-top:20px; }

  .divider{ height:1px; background:var(--line); margin:22px 0; }
  a{ color:var(--gold-bright); }
  .hint{ font-size:12.5px; color:var(--parchment); opacity:0.55; margin-top:4px; }
</style>
</head>

const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));

function toast(msg, isErr=false){
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(()=> t.className = 'toast', 2600);
}
function fmtDate(d){
  if(!d) return '—';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}
function exportarXLSX(tableId, filename){
  const tabela = document.getElementById(tableId);
  if(!tabela){ toast('Nada para exportar ainda.', true); return; }
  const wb = XLSX.utils.table_to_book(tabela, { sheet: 'Relatório' });
  XLSX.writeFile(wb, filename + '.xlsx');
}
function exportarPDF(tableId, filename, titulo){
  const tabela = document.getElementById(tableId);
  if(!tabela){ toast('Nada para exportar ainda.', true); return; }
  const { jsPDF } = window.jspdf;
  const docpdf = new jsPDF();
  try{ docpdf.addImage(LOGO_B64, 'PNG', 14, 8, 18, 18); }catch(e){}
  docpdf.setFontSize(14);
  docpdf.text(titulo, 38, 16);
  docpdf.setFontSize(9);
  docpdf.text('Loja Fernando Pessoa nº 4001 — gerado em ' + new Date().toLocaleDateString('pt-BR'), 38, 22);
  docpdf.autoTable({ html: '#' + tableId, startY: 32, styles: { fontSize: 9 } });
  docpdf.save(filename + '.pdf');
}
function botoesExportar(tableId, filename, titulo){
  return `
    <div style="display:flex; gap:8px; margin-bottom:14px;">
      <button class="ghost" style="border:1px solid var(--line);" onclick="exportarXLSX('${tableId}', '${filename}')">⬇ Baixar XLSX</button>
      <button class="ghost" style="border:1px solid var(--line);" onclick="exportarPDF('${tableId}', '${filename}', '${titulo}')">⬇ Baixar PDF</button>
    </div>`;
}
function openModal(html){
  $('#modal-content').innerHTML = html;
  $('#modal-overlay').classList.add('show');
}
function closeModal(){ $('#modal-overlay').classList.remove('show'); }
$('#modal-overlay').addEventListener('click', e => { if(e.target.id === 'modal-overlay') closeModal(); });

/* ---------------- AUTH ---------------- */
$('#btn-login').addEventListener('click', async () => {
  const email = $('#login-email').value.trim();
  const password = $('#login-pass').value;
  $('#login-error').textContent = '';
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ $('#login-error').textContent = 'Não foi possível entrar: e-mail ou senha incorretos.'; return; }
  await checkMestreAndEnter(data.user);
});

$('#btn-logout').addEventListener('click', async () => {
  await sb.auth.signOut();
  location.href = 'index.html';
});

async function checkMestreAndEnter(user){
  const { data: mestre, error } = await sb.from('mestres').select('*').eq('id', user.id).maybeSingle();
  if(error || !mestre){
    $('#login-error').textContent = 'Este e-mail não está autorizado como Mestre no sistema.';
    await sb.auth.signOut();
    return;
  }
  $('#who-am-i').textContent = `${mestre.nome} · ${mestre.papel}`;
  $('#view-login').style.display = 'none';
  $('#view-app').style.display = 'block';
  goTo('membros');
}

(async () => {
  const { data } = await sb.auth.getSession();
  if(data.session){ await checkMestreAndEnter(data.session.user); }
})();

/* ---------------- NAV ---------------- */
$$('nav button').forEach(btn => {
  btn.addEventListener('click', () => goTo(btn.dataset.page));
});
function goTo(page){
  $$('nav button').forEach(b => b.classList.toggle('active', b.dataset.page === page));
  const renderers = { membros: renderMembros, parentes: renderParentes, graus: renderGraus, aniversariantes: renderAniversariantesHoje, sessoes: renderSessoes, entregas: renderEntregas, atas: renderAtas, visitacoes: renderVisitacoes, tesouraria: renderTesouraria, relatorios: renderRelatorios };
  renderers[page]();
}

/* ---------------- MEMBROS ---------------- */
async function renderMembros(){
  const main = $('#main');
  main.innerHTML = `
    <div class="page-head">
      <h2>Membros</h2>
      <button id="btn-novo-membro">+ Novo membro</button>
    </div>
    <div class="toolbar">
      <input type="text" id="busca-membro" placeholder="Buscar por nome ou CIM...">
      <select id="filtro-ativo" style="max-width:180px;">
        <option value="todos">Todos</option>
        <option value="ativos" selected>Somente ativos</option>
        <option value="inativos">Somente inativos</option>
      </select>
      <select id="filtro-cotizante" style="max-width:180px;">
        <option value="todos" selected>Cotização: todos</option>
        <option value="cotizantes">Somente cotizantes</option>
        <option value="nao-cotizantes">Somente não cotizantes</option>
      </select>
    </div>
    <div class="card"><table>
      <thead><tr><th>CIM</th><th>Nome</th><th>Telefone</th><th>Grau</th><th>Cargo</th><th>Aniversário</th><th>Status</th><th>Cotizante</th><th></th></tr></thead>
      <tbody id="tbody-membros"><tr class="empty-row"><td colspan="9">Carregando...</td></tr></tbody>
    </table></div>`;
  $('#btn-novo-membro').addEventListener('click', () => modalMembro());
  $('#busca-membro').addEventListener('input', () => loadMembros());
  $('#filtro-ativo').addEventListener('change', () => loadMembros());
  $('#filtro-cotizante').addEventListener('change', () => loadMembros());
  loadMembros();
}
async function loadMembros(){
  const filtro = $('#busca-membro')?.value || '';
  const statusFiltro = $('#filtro-ativo')?.value || 'ativos';
  const cotizFiltro = $('#filtro-cotizante')?.value || 'todos';
  const { data, error } = await sb.from('membros').select('*').order('nome');
  const tbody = $('#tbody-membros');
  if(error){ tbody.innerHTML = `<tr class="empty-row"><td colspan="9">Erro ao carregar: ${error.message}</td></tr>`; return; }
  let rows = data;
  if(statusFiltro === 'ativos') rows = rows.filter(m => m.ativo);
  if(statusFiltro === 'inativos') rows = rows.filter(m => !m.ativo);
  if(cotizFiltro === 'cotizantes') rows = rows.filter(m => m.cotizante);
  if(cotizFiltro === 'nao-cotizantes') rows = rows.filter(m => !m.cotizante);
  if(filtro){
    const f = filtro.toLowerCase();
    rows = rows.filter(m => m.nome.toLowerCase().includes(f) || String(m.cim).includes(f));
  }
  if(!rows.length){ tbody.innerHTML = `<tr class="empty-row"><td colspan="9">Nenhum membro encontrado.</td></tr>`; return; }
  tbody.innerHTML = rows.map(m => `
    <tr>
      <td class="mono">${m.cim}</td>
      <td>${m.nome}</td>
      <td class="mono">${m.telefone || '—'}</td>
      <td><span class="badge grau">${m.grau || '—'}</span></td>
      <td>${m.cargo || '—'}</td>
      <td>${fmtDate(m.data_nascimento)}</td>
      <td><span class="badge ${m.ativo ? 'ok' : 'warn'}">${m.ativo ? 'Ativo' : 'Inativo'}</span></td>
      <td><span class="badge ${m.cotizante ? 'ok' : 'warn'}">${m.cotizante ? 'Cotizante' : 'Não cotizante'}</span></td>
      <td><button class="ghost" onclick='modalMembro(${JSON.stringify(m)})'>Editar</button></td>
    </tr>`).join('');
}
function modalMembro(m=null){
  const editing = !!m;
  openModal(`
    <h3>${editing ? 'Editar membro' : 'Novo membro'}</h3>

/* ---------------- PROGRESSÃO DE GRAUS ---------------- */
const TIPOS_GRAU = ['Iniciação', 'Elevação', 'Exaltação', 'Instalação'];
async function renderGraus(){
  const main = $('#main');
  main.innerHTML = `
    <div class="page-head"><h2>Progressão de Graus</h2><button id="btn-nova-progressao">+ Registrar progressão</button></div>
    <div class="toolbar"><input type="text" id="busca-grau" placeholder="Buscar por nome ou CIM..."></div>
    <div class="card"><table>
      <thead><tr><th>CIM</th><th>Nome</th><th>Grau atual</th><th>Iniciação</th><th>Elevação</th><th>Exaltação</th><th>Instalação</th></tr></thead>
      <tbody id="tbody-graus"><tr class="empty-row"><td colspan="7">Carregando...</td></tr></tbody>
    </table></div>`;
  $('#btn-nova-progressao').addEventListener('click', () => modalProgressao());
  $('#busca-grau').addEventListener('input', () => loadGraus());
  loadGraus();
}
async function loadGraus(){
  const filtro = $('#busca-grau')?.value?.toLowerCase() || '';
  const { data: membros, error: e1 } = await sb.from('membros').select('*').order('nome');
  const { data: progressoes, error: e2 } = await sb.from('progressao_graus').select('*');
  const tbody = $('#tbody-graus');
  if(e1 || e2){ tbody.innerHTML = `<tr class="empty-row"><td colspan="7">Erro ao carregar.</td></tr>`; return; }
  let rows = membros;
  if(filtro) rows = rows.filter(m => m.nome.toLowerCase().includes(filtro) || String(m.cim).includes(filtro));
  if(!rows.length){ tbody.innerHTML = `<tr class="empty-row"><td colspan="7">Nenhum membro encontrado.</td></tr>`; return; }
  tbody.innerHTML = rows.map(m => {
    const doMembro = progressoes.filter(p => p.cim_membro === m.cim);
    const porTipo = {};
    TIPOS_GRAU.forEach(t => { const found = doMembro.find(p => p.tipo === t); porTipo[t] = found ? found.data : null; });
    return `
      <tr>
        <td class="mono">${m.cim}</td>
        <td>${m.nome}</td>
        <td><span class="badge grau">${m.grau || '—'}</span></td>
        ${TIPOS_GRAU.map(t => `<td class="mono" style="cursor:pointer;" onclick='modalProgressao(${m.cim}, "${t}", ${JSON.stringify(porTipo[t])})'>${porTipo[t] ? fmtDate(porTipo[t]) : '—'}</td>`).join('')}
      </tr>`;
  }).join('');
}
async function modalProgressao(cimPreSelecionado=null, tipoPreSelecionado=null, dataPreExistente=null){
  const { data: membros } = await sb.from('membros').select('cim, nome').order('nome');
  const options = membros.map(m => `<option value="${m.cim}" ${cimPreSelecionado === m.cim ? 'selected' : ''}>${m.nome} (${m.cim})</option>`).join('');
  const tipoOptions = TIPOS_GRAU.map(t => `<option value="${t}" ${tipoPreSelecionado === t ? 'selected' : ''}>${t}</option>`).join('');
  openModal(`
    <h3>Registrar progressão de grau</h3>
    <div class="field"><label>Membro</label><select id="f-cim-grau">${options}</select></div>
    <div class="field"><label>Tipo</label><select id="f-tipo-grau">${tipoOptions}</select></div>
    <div class="field"><label>Data</label><input type="date" id="f-data-grau" value="${dataPreExistente ?? ''}"></div>
    <div class="modal-actions">
      <button class="ghost" onclick="closeModal()">Cancelar</button>
      <button id="btn-salvar-grau">Salvar</button>
    </div>`);
  $('#btn-salvar-grau').addEventListener('click', async () => {
    const payload = {
      cim_membro: Number($('#f-cim-grau').value),
      tipo: $('#f-tipo-grau').value,
      data: $('#f-data-grau').value,
    };
    if(!payload.data){ toast('Escolha uma data.', true); return; }
    const { error } = await sb.from('progressao_graus').upsert(payload, { onConflict: 'cim_membro,tipo' });
    if(error){ toast('Erro ao salvar: ' + error.message, true); return; }
    closeModal(); toast('Progressão registrada.'); loadGraus();
  });
}

async function abrirPresenca(sessaoId, dataFmt){

  openModal(`

    <div style="max-height:340px; overflow-y:auto; margin-bottom:10px;">
      ${membros.map(m => `

          ${m.nome}
        </label>`).join('')}
    </div>
    <div class="modal-actions">
      <button class="ghost" onclick="closeModal()">Cancelar</button>
      <button id="btn-salvar-presenca">Salvar presenças</button>
    </div>`);
  $('#btn-salvar-presenca').addEventListener('click', async () => {
    const checks = $$('#modal-content input[type=checkbox]');
    const rows = checks.map(c => ({ cim_membro: Number(c.dataset.cim), sessao_id: sessaoId, entregue: c.checked }));
    const { error } = await sb.from('presencas').upsert(rows, { onConflict: 'cim_membro,sessao_id' });
    if(error){ toast('Erro: ' + error.message, true); return; }
    closeModal(); toast('Presenças salvas.');
  });
}

function fmtMesAno(d){

}

async function loadTesouraria(){
  const filtro = $('#busca-lancamento')?.value || '';
  const de = mesInputParaISO($('#filtro-tesouraria-de')?.value || '');
  const ateMes = $('#filtro-tesouraria-ate')?.value || '';
  let q = sb.from('tesouraria_lancamentos').select('*').order('data', { ascending: false });
  if(de) q = q.gte('data', de);
  if(ateMes){
    // inclui o mês inteiro selecionado em "até"
    const [ay, am] = ateMes.split('-').map(Number);
    const proximoMes = am === 12 ? `${ay + 1}-01-01` : `${ay}-${String(am + 1).padStart(2,'0')}-01`;
    q = q.lt('data', proximoMes);
  }
  const { data: lancamentos, error } = await q;
  const tbody = $('#tbody-tesouraria');
  const tbodySit = $('#tbody-situacao-tesouraria');
  if(error){ tbody.innerHTML = `<tr class="empty-row"><td colspan="6">Erro: ${error.message}</td></tr>`; return; }
  let rows = lancamentos;
  if(filtro){
    const f = filtro.toLowerCase();
    rows = rows.filter(l => (l.descricao || '').toLowerCase().includes(f));
  }
  const { data: membros } = await sb.from('membros').select('cim, nome').eq('ativo', true).eq('cotizante', true).order('nome');
  const totalCotizantes = membros.length;

  if(!rows.length){
    tbody.innerHTML = `<tr class="empty-row"><td colspan="6">Nenhum lançamento encontrado.</td></tr>`;
    tbodySit.innerHTML = `<tr class="empty-row"><td colspan="7">Nenhum lançamento no período.</td></tr>`;
    return;
  }

  const ids = rows.map(l => l.id);
  const { data: pagamentos } = await sb.from('tesouraria_pagamentos').select('lancamento_id, cim_membro, status').in('lancamento_id', ids);
  const statusPorLancamento = {};
  const statusPorMembro = {};
  (pagamentos || []).forEach(p => {
    (statusPorLancamento[p.lancamento_id] ??= {})[p.cim_membro] = p.status;
    (statusPorMembro[p.cim_membro] ??= {})[p.lancamento_id] = p.status;
  });

  tbody.innerHTML = rows.map(l => {
    const statusMembros = statusPorLancamento[l.id] || {};
    let pagos = 0, isentos = 0;
    membros.forEach(m => {
      const st = statusMembros[m.cim];
      if(st === 'pago') pagos++;
      else if(st === 'isento') isentos++;
    });
    const pendentes = Math.max(totalCotizantes - pagos - isentos, 0);
    const emDia = pendentes === 0;
    return `
    <tr>
      <td class="mono">${fmtMesAno(l.data)}</td>
      <td>${l.descricao || '—'}</td>
      <td class="mono">${l.valor != null ? 'R$ ' + Number(l.valor).toFixed(2).replace('.', ',') : '—'}</td>
      <td><span class="badge ${emDia ? 'ok' : 'warn'}">${pagos} pago(s)${isentos ? ' · ' + isentos + ' isento(s)' : ''} · ${pendentes} pendente(s)</span></td>
      <td><button class="ghost" onclick='modalLancamento(${JSON.stringify(l)})'>Editar</button></td>
      <td><button class="ghost" onclick="abrirPagamentos(${l.id}, '${fmtMesAno(l.data)}', ${l.valor ?? 'null'})">Marcar pagamentos</button></td>
    </tr>`;
  }).join('');

  const totalLancamentos = rows.length;
  tbodySit.innerHTML = membros.map(m => {
    const statusMeses = statusPorMembro[m.cim] || {};
    let pagos = 0, isentos = 0;
    Object.values(statusMeses).forEach(st => {
      if(st === 'pago') pagos++;
      else if(st === 'isento') isentos++;
    });
    const pendentes = Math.max(totalLancamentos - pagos - isentos, 0);
    const emDia = pendentes === 0;
    return `
    <tr>
      <td class="mono">${m.cim}</td>
      <td>${m.nome}</td>
      <td class="mono">${totalLancamentos}</td>
      <td class="mono">${pagos}</td>
      <td class="mono">${isentos}</td>
      <td class="mono">${pendentes}</td>
      <td><span class="badge ${emDia ? 'ok' : 'warn'}">${emDia ? 'Em dia' : 'Pendente'}</span></td>
    </tr>`;
  }).join('');
}

function imprimirAta(a){
  const html = gerarHtmlAta(a);
  const janela = window.open('', '_blank');
  janela.document.write(html);
  janela.document.close();
  setTimeout(() => { janela.focus(); janela.print(); }, 600);
}
function baixarAtaWord(a){
  const html = gerarHtmlAta(a);
  const blob = htmlDocx.asBlob(html);
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `Ata_${(a.numero || 'sem_numero').replace(/[\/\\]/g, '-')}.docx`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

async function loadFrequencia(de='', ate=''){
  const tbody = $('#tbody-freq');
  if(!tbody) return;
  if(!de && !ate){
    const { data, error } = await sb.from('v_frequencia_membro').select('*').order('nome');
    if(error){ tbody.innerHTML = `<tr class="empty-row"><td colspan="4">Erro: ${error.message}</td></tr>`; return; }
    if(!data.length){ tbody.innerHTML = `<tr class="empty-row"><td colspan="4">Sem dados de frequência ainda.</td></tr>`; return; }
    tbody.innerHTML = data.map(f => `
      <tr><td>${f.nome}</td><td class="mono">${f.sessoes_registradas}</td><td class="mono">${f.presencas}</td>
      <td><span class="badge ${f.percentual >= 60 ? 'ok' : 'warn'}">${f.percentual}%</span></td></tr>`).join('');
    return;
  }
  let sq = sb.from('sessoes_trabalho').select('id, data');
  if(de) sq = sq.gte('data', de);
  if(ate) sq = sq.lte('data', ate);
  const { data: sessoesPeriodo, error: e1 } = await sq;
  if(e1){ tbody.innerHTML = `<tr class="empty-row"><td colspan="4">Erro: ${e1.message}</td></tr>`; return; }
  const idsSessoes = sessoesPeriodo.map(s => s.id);
  const { data: membros, error: e2 } = await sb.from('membros').select('cim, nome').eq('ativo', true).order('nome');
  if(e2){ tbody.innerHTML = `<tr class="empty-row"><td colspan="4">Erro: ${e2.message}</td></tr>`; return; }
  if(!idsSessoes.length){ tbody.innerHTML = `<tr class="empty-row"><td colspan="4">Nenhuma sessão no período selecionado.</td></tr>`; return; }
  const { data: presencas, error: e3 } = await sb.from('presencas').select('*').in('sessao_id', idsSessoes);
  if(e3){ tbody.innerHTML = `<tr class="empty-row"><td colspan="4">Erro: ${e3.message}</td></tr>`; return; }
  const linhas = membros.map(m => {
    const doMembro = presencas.filter(p => p.cim_membro === m.cim);
    const totalPresente = doMembro.filter(p => p.entregue).length;
    const pct = idsSessoes.length ? Math.round((totalPresente / idsSessoes.length) * 1000) / 10 : 0;
    return { nome: m.nome, sessoes: idsSessoes.length, presencas: totalPresente, pct };
  });
  tbody.innerHTML = linhas.map(f => `
    <tr><td>${f.nome}</td><td class="mono">${f.sessoes}</td><td class="mono">${f.presencas}</td>
    <td><span class="badge ${f.pct >= 60 ? 'ok' : 'warn'}">${f.pct}%</span></td></tr>`).join('');
}

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([

function excelDataParaISO(valor){
  if(valor == null || valor === '') return null;
  if(typeof valor === 'number'){
    const d = XLSX.SSF.parse_date_code(valor);
    if(!d) return null;
    return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
  }
  const s = String(valor).trim();
  const br = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if(br) return `${br[3]}-${br[2].padStart(2,'0')}-${br[1].padStart(2,'0')}`;
  const iso = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(iso) return `${iso[1]}-${iso[2].padStart(2,'0')}-${iso[3].padStart(2,'0')}`;
  return null;
}
async function resolverCimPorNomeOuCim(valor, mapaMembros){
  if(valor == null || valor === '') return null;
  const s = String(valor).trim();
  if(/^\d+$/.test(s)) return Number(s);
  const achado = mapaMembros.get(s.toLowerCase());
  return achado ?? null;
}
async function importarVisitacoesXLSX(file){
  const { data: membros } = await sb.from('membros').select('cim, nome');
  const mapaMembros = new Map(membros.map(m => [m.nome.trim().toLowerCase(), m.cim]));
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: 'array', cellDates: false });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const linhas = XLSX.utils.sheet_to_json(ws, { defval: '' });
  const registros = [];
  const erros = [];
  for(const [i, linha] of linhas.entries()){
    const dataRaw = linha['Data'] ?? linha['data'];
    const loja = (linha['Loja Visitada'] ?? linha['Loja'] ?? linha['loja'] ?? '').toString().trim();
    const irmaoRaw = linha['Irmão'] ?? linha['Irmao'] ?? linha['CIM'] ?? linha['cim'] ?? linha['Nome'] ?? linha['nome'];
    const dataISO = excelDataParaISO(dataRaw);
    const cim = await resolverCimPorNomeOuCim(irmaoRaw, mapaMembros);
    if(!dataISO || !loja || !cim){
      erros.push(`Linha ${i + 2}: ${!dataISO ? 'data inválida' : ''} ${!loja ? 'loja vazia' : ''} ${!cim ? 'irmão não encontrado (' + irmaoRaw + ')' : ''}`.trim());
      continue;
    }
    registros.push({ data: dataISO, loja_visitada: loja, cim_membro: cim });
  }
  mostrarPreviaImportacao(registros, erros, membros);
}
async function importarVisitacoesPDF(file){
  if(!window.pdfjsLib){ toast('Biblioteca de leitura de PDF não carregou. Tente recarregar a página.', true); return; }
  const { data: membros } = await sb.from('membros').select('cim, nome');
  const mapaMembros = new Map(membros.map(m => [m.nome.trim().toLowerCase(), m.cim]));
  const buf = await file.arrayBuffer();
  const doc = await pdfjsLib.getDocument({ data: buf }).promise;
  let textoCompleto = '';
  for(let p = 1; p <= doc.numPages; p++){
    const page = await doc.getPage(p);
    const content = await page.getTextContent();
    textoCompleto += content.items.map(it => it.str).join(' ') + '\n';
  }
  const linhas = textoCompleto.split('\n').map(l => l.trim()).filter(Boolean);
  const registros = [];
  const erros = [];
  linhas.forEach((linha, i) => {
    const m = linha.match(/(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4})\s*[-–|]\s*(.+?)\s*[-–|]\s*(.+)/);
    if(!m){ return; }
    const dataISO = excelDataParaISO(m[1]);
    const loja = m[2].trim();
    const irmaoRaw = m[3].trim();
    const cim = mapaMembros.get(irmaoRaw.toLowerCase()) ?? (/^\d+$/.test(irmaoRaw) ? Number(irmaoRaw) : null);
    if(!dataISO || !loja || !cim){
      erros.push(`Linha do PDF "${linha}": ${!dataISO ? 'data inválida' : ''} ${!cim ? 'irmão não encontrado (' + irmaoRaw + ')' : ''}`.trim());
      return;
    }
    registros.push({ data: dataISO, loja_visitada: loja, cim_membro: cim });
  });
  if(!registros.length && !erros.length){
    toast('Não encontrei linhas no formato "DD/MM/AAAA - Loja - Nome do Irmão" no PDF. Confira o texto ou use a importação por XLSX, que é mais confiável.', true);
    return;
  }
  mostrarPreviaImportacao(registros, erros, membros);
}
function mostrarPreviaImportacao(registros, erros, membros){
  const mapaCimNome = new Map(membros.map(m => [m.cim, m.nome]));
  const linhasHtml = registros.map(r => `
    <tr><td class="mono">${fmtDate(r.data)}</td><td>${r.loja_visitada}</td><td>${mapaCimNome.get(r.cim_membro) ?? r.cim_membro}</td></tr>`).join('');
  const errosHtml = erros.length ? `
    <div class="hint" style="color:var(--danger); margin-top:10px;">
      ${erros.length} linha(s) ignorada(s):<br>${erros.join('<br>')}
    </div>` : '';
  $('#import-preview').innerHTML = `
    <div class="card" style="margin-top:14px;">
      <h3>Prévia da importação (${registros.length} registro(s) válido(s))</h3>
      ${registros.length ? `
        <table><thead><tr><th>Data</th><th>Loja visitada</th><th>Irmão</th></tr></thead>
        <tbody>${linhasHtml}</tbody></table>
        <div class="modal-actions" style="margin-top:12px;">
          <button class="ghost" onclick="document.getElementById('import-preview').innerHTML=''">Cancelar</button>
          <button id="btn-confirmar-import">Confirmar e gravar ${registros.length} visitação(ões)</button>
        </div>` : '<div class="hint">Nenhum registro válido para importar.</div>'}
      ${errosHtml}
    </div>`;
  if(registros.length){
    $('#btn-confirmar-import').addEventListener('click', async () => {
      const { error } = await sb.from('visitacoes').insert(registros);
      if(error){ toast('Erro ao importar: ' + error.message, true); return; }
      toast(`${registros.length} visitação(ões) importada(s) com sucesso.`);
      $('#import-preview').innerHTML = '';
      $('#import-xlsx-file').value = '';
      $('#import-pdf-file').value = '';
      loadVisitacoesRelatorio();
    });
  }
}
</script>
